kind = "web"
previewPath = "/"
title = "Character & Mental Health Analyzer"
version = "1.0.0"
id = "artifacts/character-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21867

[services.development]
run = "pnpm --filter @workspace/character-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/character-analyzer", "run", "build" ]
publicDir = "artifacts/character-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21867"
BASE_PATH = "/"
